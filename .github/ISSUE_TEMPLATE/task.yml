name: Task
description: A concrete task for the foundation or an active project
title: "Task: "
labels: ["task"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed?
    validations:
      required: true
  - type: textarea
    id: work
    attributes:
      label: Work required
      description: What should be done?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will we know this task is complete?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes or references
      description: Add links, examples, constraints, or related issues.
