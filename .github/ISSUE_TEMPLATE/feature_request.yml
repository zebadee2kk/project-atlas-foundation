name: Feature request
description: Suggest a new feature or improvement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Why is this needed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change as concretely as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other options were considered? Why was this chosen?
  - type: textarea
    id: references
    attributes:
      label: References or examples
      description: Add links, mockups, or related work.
